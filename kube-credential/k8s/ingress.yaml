apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kube-credential-ingress
  namespace: kube-credential
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: kube-credential.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api/issuance
            pathType: Prefix
            backend:
              service:
                name: issuance-service
                port:
                  number: 3000
          - path: /api/verification
            pathType: Prefix
            backend:
              service:
                name: verification-service
                port:
                  number: 3001
